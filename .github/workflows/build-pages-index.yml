name: Build Pages Search Index

on:
  push:
    branches:
      - main
    paths:
      - 'data/frus/volumes/**'
      - 'app.py'
      - 'scripts/**'
      - 'docs/**'

permissions:
  contents: write

jobs:
  build-index:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build search index
        run: python scripts/build_search_index.py

      - name: Commit updated search index
        run: |
          if git diff --quiet -- docs/search-index.json; then
            echo "No search index changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/search-index.json
          git commit -m "Update docs search index"
          git push
